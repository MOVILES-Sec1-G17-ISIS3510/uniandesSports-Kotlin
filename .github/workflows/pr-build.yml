name: PR App Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create CI local.properties
        shell: bash
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Restore google-services.json
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > app/google-services.json
          else
            echo "Missing secret: set GOOGLE_SERVICES_JSON (raw JSON) or GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build app
        run: ./gradlew --no-daemon clean :app:assembleDebug --stacktrace

      - name: Build result
        if: success()
        run: echo "correcto"

      - name: Build result
        if: failure()
        run: echo "incorrecto"
